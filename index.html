<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video + SRT Merger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #14141c;
            border-radius: 24px;
            padding: 32px;
            border: 1px solid #2a2a35;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px dashed #2a2a3a;
            background: #0f0f17;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: 700;
            color: #e5e5e5;
        }
        .upload-btn:hover {
            border-color: #60a5fa;
            background: #181825;
        }
        .upload-btn.video:hover { border-color: #3b82f6; }
        .upload-btn.srt:hover { border-color: #8b5cf6; }
        .upload-btn .badge {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            background: #2a2a3a;
            color: #aaa;
        }
        .upload-btn .badge.video { background: #3b82f6; color: white; }
        .upload-btn .badge.srt { background: #8b5cf6; color: white; }
        .upload-btn input[type="file"] { display: none; }
        .file-name {
            font-size: 13px;
            color: #888;
            margin-left: 8px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
        }
        .file-status .icon { font-size: 18px; }
        .file-status.loaded { background: #1a2a1a; color: #4ade80; }
        .file-status.empty { background: #1a1a1a; color: #666; }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }
        .btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 8px 30px rgba(59,130,246,0.3); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn.secondary { background: #2a2a3a; color: #aaa; margin-top: 8px; }
        .btn.secondary:hover:not(:disabled) { background: #3a3a4a; }
        .progress-container { margin-top: 20px; display: none; }
        .progress-bar { width: 100%; height: 6px; background: #1a1a26; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 0%; border-radius: 10px; transition: width 0.3s ease; }
        .progress-text { font-size: 13px; color: #888; margin-top: 8px; text-align: center; }
        .result { margin-top: 24px; display: none; }
        .result video { width: 100%; border-radius: 16px; background: #000; max-height: 400px; }
        .result .download-btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background: #22c55e;
            color: white;
            text-align: center;
            border-radius: 14px;
            font-weight: 800;
            text-decoration: none;
            margin-top: 12px;
            transition: all 0.3s ease;
        }
        .result .download-btn:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(34,197,94,0.3); }
        .note {
            margin-top: 20px;
            padding: 14px 18px;
            background: #1a1a2e;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            font-size: 13px;
            color: #888;
            line-height: 1.6;
        }
        .note strong { color: #ccc; }
        .note code { background: #0a0a12; padding: 2px 8px; border-radius: 6px; font-size: 12px; color: #a78bfa; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎬 Video + SRT Merger</h1>
    <p class="subtitle">Video နဲ့ SRT ဖိုင်ကို ပေါင်းပြီး တစ်ခုတည်းသော Video ဖန်တီးပါ</p>

    <!-- Upload Section -->
    <div class="upload-section">
        <label class="upload-btn video" id="videoBtn">
            <span class="badge video">VIDEO</span>
            <span id="videoLabel">ဗီဒီယိုဖိုင် ရွေးပါ</span>
            <span class="file-name" id="videoName"></span>
            <input type="file" id="videoInput" accept=".mp4,.mov,.avi,.mkv,.webm">
        </label>

        <label class="upload-btn srt" id="srtBtn">
            <span class="badge srt">SRT</span>
            <span id="srtLabel">စာတန်းဖိုင် ရွေးပါ</span>
            <span class="file-name" id="srtName"></span>
            <input type="file" id="srtInput" accept=".srt,.ass,.vtt">
        </label>
    </div>

    <!-- Status -->
    <div id="statusVideo" class="file-status empty"><span class="icon">⏳</span> Video မရွေးရသေးပါ</div>
    <div id="statusSrt" class="file-status empty"><span class="icon">⏳</span> SRT မရွေးရသေးပါ</div>

    <button class="btn" id="mergeBtn" disabled>🚀 Video + SRT ပေါင်းမည်</button>
    <button class="btn secondary" id="resetBtn">🔄 အားလုံးဖျက်မည်</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">စတင်နေပါပြီ...</div>
    </div>

    <div class="result" id="resultContainer">
        <video id="resultVideo" controls></video>
        <a href="#" id="downloadBtn" class="download-btn" download="merged_video.mp4">⬇️ Download Video</a>
    </div>

    <div class="note">
        <strong>📌 အလုပ်လုပ်ပုံ</strong><br>
        • Video နဲ့ SRT ဖိုင်ကို ရွေးပါ<br>
        • "Video + SRT ပေါင်းမည်" ကိုနှိပ်ပါ<br>
        • SRT ပါဝင်တဲ့ Video အသစ်ကို Download ရယူပါ
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "@ffmpeg/ffmpeg": "https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js",
        "@ffmpeg/core": "https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js"
    }
}
</script>

<script type="module">
import { FFmpeg } from '@ffmpeg/ffmpeg';
import { toBlobURL } from '@ffmpeg/util';

const state = { videoFile: null, subtitleFile: null, subtitleContent: null };

const videoInput = document.getElementById('videoInput');
const srtInput = document.getElementById('srtInput');
const videoLabel = document.getElementById('videoLabel');
const srtLabel = document.getElementById('srtLabel');
const videoName = document.getElementById('videoName');
const srtName = document.getElementById('srtName');
const statusVideo = document.getElementById('statusVideo');
const statusSrt = document.getElementById('statusSrt');
const mergeBtn = document.getElementById('mergeBtn');
const resetBtn = document.getElementById('resetBtn');
const progressContainer = document.getElementById('progressContainer');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const resultContainer = document.getElementById('resultContainer');
const resultVideo = document.getElementById('resultVideo');
const downloadBtn = document.getElementById('downloadBtn');

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function updateUI() {
    // Video
    if (state.videoFile) {
        videoLabel.textContent = '✅ ရွေးပြီးပါပြီ';
        videoName.textContent = `${state.videoFile.name} (${formatSize(state.videoFile.size)})`;
        statusVideo.className = 'file-status loaded';
        statusVideo.innerHTML = `<span class="icon">✅</span> ${state.videoFile.name}`;
    } else {
        videoLabel.textContent = 'ဗီဒီယိုဖိုင် ရွေးပါ';
        videoName.textContent = '';
        statusVideo.className = 'file-status empty';
        statusVideo.innerHTML = '<span class="icon">⏳</span> Video မရွေးရသေးပါ';
    }

    // SRT
    if (state.subtitleFile) {
        srtLabel.textContent = '✅ ရွေးပြီးပါပြီ';
        srtName.textContent = `${state.subtitleFile.name} (${formatSize(state.subtitleFile.size)})`;
        statusSrt.className = 'file-status loaded';
        statusSrt.innerHTML = `<span class="icon">✅</span> ${state.subtitleFile.name}`;
    } else {
        srtLabel.textContent = 'စာတန်းဖိုင် ရွေးပါ';
        srtName.textContent = '';
        statusSrt.className = 'file-status empty';
        statusSrt.innerHTML = '<span class="icon">⏳</span> SRT မရွေးရသေးပါ';
    }

    mergeBtn.disabled = !(state.videoFile && state.subtitleFile);
}

// Video Input
videoInput.addEventListener('change', async () => {
    const file = videoInput.files[0];
    if (file) {
        state.videoFile = file;
        updateUI();
    }
    videoInput.value = '';
});

// SRT Input
srtInput.addEventListener('change', async () => {
    const file = srtInput.files[0];
    if (file) {
        state.subtitleFile = file;
        state.subtitleContent = await file.text();
        updateUI();
    }
    srtInput.value = '';
});

// Reset
resetBtn.addEventListener('click', () => {
    state.videoFile = null;
    state.subtitleFile = null;
    state.subtitleContent = null;
    resultContainer.style.display = 'none';
    progressContainer.style.display = 'none';
    resultVideo.src = '';
    downloadBtn.href = '#';
    updateUI();
});

// Merge
mergeBtn.addEventListener('click', async () => {
    if (!state.videoFile || !state.subtitleContent) {
        alert('Video နဲ့ Subtitle ဖိုင် နှစ်ခုလုံး ရွေးပါ။');
        return;
    }

    mergeBtn.disabled = true;
    mergeBtn.textContent = '⏳ ပေါင်းနေပါပြီ...';
    progressContainer.style.display = 'block';
    resultContainer.style.display = 'none';
    progressFill.style.width = '0%';
    progressText.textContent = 'FFmpeg ကို စတင်နေပါပြီ...';

    try {
        progressText.textContent = 'FFmpeg Engine ကို ဆွဲတင်နေပါပြီ (၂၅MB ခန့်)...';
        progressFill.style.width = '10%';

        const ffmpeg = new FFmpeg();
        const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
        await ffmpeg.load({
            coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
            wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
        });

        progressText.textContent = 'ဖိုင်များကို Memory ထဲသို့ ကူးနေပါပြီ...';
        progressFill.style.width = '30%';

        const videoData = await state.videoFile.arrayBuffer();
        ffmpeg.FS('writeFile', 'input.mp4', new Uint8Array(videoData));

        const subtitleData = new TextEncoder().encode(state.subtitleContent);
        ffmpeg.FS('writeFile', 'subtitle.srt', subtitleData);

        progressText.textContent = 'Video နဲ့ Subtitle ကို ပေါင်းနေပါပြီ (ခဏစောင့်ပါ)...';
        progressFill.style.width = '50%';

        await ffmpeg.exec([
            '-i', 'input.mp4',
            '-i', 'subtitle.srt',
            '-c:v', 'libx264',
            '-c:a', 'aac',
            '-movflags', '+faststart',
            '-preset', 'ultrafast',
            '-crf', '23',
            '-map', '0:v',
            '-map', '0:a?',
            '-map', '1',
            '-c:s', 'mov_text',
            '-metadata:s:s:0', 'language=my',
            'output.mp4'
        ]);

        progressText.textContent = 'Video ကို ထုတ်ယူနေပါပြီ...';
        progressFill.style.width = '85%';

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const blob = new Blob([data.buffer], { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);

        progressFill.style.width = '100%';
        progressText.textContent = '✅ ပေါင်းပြီးပါပြီ!';
        resultContainer.style.display = 'block';
        resultVideo.src = url;
        downloadBtn.href = url;
        downloadBtn.download = `merged_${state.videoFile.name}`;

        ffmpeg.FS('unlink', 'input.mp4');
        ffmpeg.FS('unlink', 'subtitle.srt');
        ffmpeg.FS('unlink', 'output.mp4');

    } catch (error) {
        console.error('Error:', error);
        progressText.textContent = '❌ အမှားတစ်ခုဖြစ်နေပါတယ်: ' + error.message;
        progressFill.style.width = '100%';
        progressFill.style.background = '#ef4444';
        alert('ပေါင်းခြင်း မအောင်မြင်ပါဘူး။\n' + error.message);
    } finally {
        mergeBtn.disabled = false;
        mergeBtn.textContent = '🚀 Video + SRT ပေါင်းမည်';
        setTimeout(() => {
            progressFill.style.background = 'linear-gradient(90deg, #3b82f6, #8b5cf6)';
        }, 3000);
    }
});

updateUI();
</script>
</body>
</html>
